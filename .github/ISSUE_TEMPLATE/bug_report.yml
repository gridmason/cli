name: Bug report
description: Report a defect in the gridmason CLI.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. For a suspected **security**
        vulnerability, do not use this form — follow [SECURITY.md](../SECURITY.md).
  - type: input
    id: version
    attributes:
      label: CLI version
      description: Output of `gridmason --version` (or the npm version you installed).
      placeholder: "0.0.1"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v22.0.0"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command run
      description: The exact `gridmason ...` command (with flags) that misbehaved.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead. Include the full output (add `--json` if relevant).
      render: shell
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps — ideally a project or manifest that triggers it.
    validations:
      required: false
