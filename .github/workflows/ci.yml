name: CI

# Runs only on main so integration (epic/**) and worker (issue/**) pushes stay
# quiet — those carry [skip ci] and open CI-free draft PRs into their epic
# branch. CI runs once when the batch PR lands on main. GitHub Actions honors
# [skip ci] natively, so a pushed head commit ending in [skip ci] is never built.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build + typecheck + test + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  e2e:
    name: e2e (scaffold -> lint, all templates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Drives the built binary end to end — `widget init` each template then
      # `gridmason lint` — so a regression in any check (or a template drifting
      # into tripping one) fails the build. The suite builds the binary in its
      # globalSetup; `npm run build` here surfaces a build break as its own step.
      - run: npm run build
      - run: npm run test:e2e
